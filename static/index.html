<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadent — AI Road Emergency Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    /* ── Tokens ─────────────────────────────────── */
    :root {
      --cream:       #faf8f4;
      --cream2:      #f4f1eb;
      --cream3:      #ede9e0;
      --stone:       #e8e2d8;
      --border:      #ddd8ce;
      --coral:       #d95f3b;
      --coral-soft:  #f2896a;
      --coral-bg:    #fdf0eb;
      --coral-ring:  rgba(217,95,59,0.2);
      --sage:        #5a8a6a;
      --sage-bg:     #edf4ef;
      --sky:         #3b7fc4;
      --sky-bg:      #eaf2fb;
      --amber:       #b07d2a;
      --amber-bg:    #fdf5e4;
      --text:        #2a2520;
      --text-mid:    #6b6058;
      --text-soft:   #9c9389;
      --text-faint:  #c5bfb6;
      --display:     'Fraunces', Georgia, serif;
      --body:        'Instrument Sans', sans-serif;
      --radius-sm:   8px;
      --radius:      14px;
      --radius-lg:   20px;
      --shadow:      0 2px 12px rgba(42,37,32,0.07);
      --shadow-md:   0 4px 24px rgba(42,37,32,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--body);
      background: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ───────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      height: 56px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--coral);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-soft);
      font-weight: 400;
      margin-left: 2px;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
      font-size: 12px;
      color: var(--text-mid);
    }

    .chip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background 0.4s, box-shadow 0.4s;
      flex-shrink: 0;
    }

    .chip-dot.locating { background: var(--amber); animation: blink 1.2s ease-in-out infinite; }
    .chip-dot.online   { background: var(--sage); box-shadow: 0 0 0 3px var(--sage-bg); }
    .chip-dot.offline  { background: var(--amber); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── Layout ────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map ───────────────────────────────────── */
    #map-panel {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* soft right-edge fade into chat panel */
    #map-panel::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, var(--cream));
      pointer-events: none;
      z-index: 400;
    }

    .coord-pill {
      position: absolute;
      bottom: 18px;
      left: 16px;
      background: rgba(250,248,244,0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 11.5px;
      color: var(--text-mid);
      z-index: 500;
      backdrop-filter: blur(6px);
      display: none;
      letter-spacing: 0.02em;
    }

    .coord-pill.show { display: block; }

    /* ── Chat Panel ────────────────────────────── */
    #chat-panel {
      width: 390px;
      flex-shrink: 0;
      background: var(--cream);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* ── Panel Header ──────────────────────────── */
    #panel-header {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--cream);
    }

    .header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    /* SOS Button */
    #sos-btn {
      width: 100%;
      padding: 14px 20px;
      background: var(--coral);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--display);
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      position: relative;
    }

    #sos-btn .sos-icon {
      font-size: 20px;
      line-height: 1;
    }

    #sos-btn:not(:disabled):hover {
      background: #c4502d;
      box-shadow: 0 4px 20px rgba(217,95,59,0.35);
      transform: translateY(-1px);
    }

    #sos-btn:not(:disabled):active { transform: translateY(0); }

    #sos-btn:disabled {
      background: var(--stone);
      color: var(--text-faint);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .sos-hint {
      font-size: 11.5px;
      color: var(--text-soft);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    /* offline notice */
    #offline-notice {
      display: none;
      margin-top: 10px;
      background: var(--amber-bg);
      border: 1px solid rgba(176,125,42,0.2);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      color: var(--amber);
      display: none;
      align-items: center;
      gap: 6px;
    }

    #offline-notice.show {
      display: flex;
    }

    /* ── Messages ──────────────────────────────── */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--stone) transparent;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 4px; }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      animation: rise 0.28s cubic-bezier(.22,.68,0,1.2);
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(8px) scale(0.98); }
      to   { opacity:1; transform: none; }
    }

    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.bot  { align-items: flex-start; }

    .msg-sender {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      max-width: 92%;
      font-size: 14px;
      line-height: 1.65;
    }

    .bubble.user {
      background: var(--coral);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .bubble.warn {
      background: var(--amber-bg);
      border: 1px solid rgba(176,125,42,0.18);
    }

    /* Service card inside bubble */
    .svc-section { margin-top: 12px; }

    .svc-section-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .svc-card {
      display: flex;
      align-items: center;
      gap: 11px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      margin-bottom: 5px;
    }

    .svc-emoji { font-size: 18px; flex-shrink: 0; }

    .svc-body { flex: 1; min-width: 0; }

    .svc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .svc-phone {
      font-size: 12px;
      color: var(--sage);
      font-weight: 500;
      margin-top: 2px;
    }

    .svc-addr {
      font-size: 11px;
      color: var(--text-soft);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .svc-dist {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      flex-shrink: 0;
      background: var(--cream3);
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* national numbers strip */
    .national-strip {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .nat-chip {
      flex: 1;
      text-align: center;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 4px;
      font-size: 11px;
      color: var(--text-mid);
    }

    .nat-chip strong {
      display: block;
      font-size: 14px;
      color: var(--coral);
      font-family: var(--display);
    }

    /* Source badge — Local DB vs OpenStreetMap */
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .source-badge.local {
      background: var(--sage-bg);
      color: var(--sage);
      border: 1px solid rgba(90,138,106,0.2);
    }
    .source-badge.osm {
      background: var(--sky-bg);
      color: var(--sky);
      border: 1px solid rgba(59,127,196,0.2);
    }

    /* Report button */
    .report-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px 14px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-mid);
      font-family: var(--body);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s;
    }
    .report-btn:hover {
      background: var(--cream3);
      border-color: var(--coral-soft);
      color: var(--text);
    }
    .report-btn.copied {
      background: var(--sage-bg);
      border-color: rgba(90,138,106,0.3);
      color: var(--sage);
    }

    /* Typing indicator */
    .typing-row { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .typing-row span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--stone);
      animation: bob 1.1s ease-in-out infinite;
    }
    .typing-row span:nth-child(2) { animation-delay: 0.18s; }
    .typing-row span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bob {
      0%,60%,100% { transform: translateY(0); background: var(--stone); }
      30%          { transform: translateY(-5px); background: var(--coral-soft); }
    }

    /* ── Bottom Bar ────────────────────────────── */
    #bottom {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    /* hotlines */
    #hotlines {
      display: flex;
      background: var(--cream2);
      border-bottom: 1px solid var(--border);
    }

    .hotline {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      font-size: 11px;
      color: var(--text-mid);
      border-right: 1px solid var(--border);
    }
    .hotline:last-child { border-right: none; }
    .hotline strong {
      display: block;
      font-family: var(--display);
      font-size: 15px;
      color: var(--coral);
      margin-bottom: 1px;
    }

    /* input row */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px 14px;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--body);
      font-size: 14px;
      padding: 11px 15px;
      outline: none;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.4;
    }

    #chat-input:focus {
      border-color: var(--coral-soft);
      box-shadow: 0 0 0 3px var(--coral-ring);
    }

    #chat-input::placeholder { color: var(--text-faint); }
    #chat-input:disabled { opacity: 0.5; cursor: not-allowed; background: var(--cream2); }

    #send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--coral);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
    }

    #send-btn svg { width: 17px; height: 17px; fill: white; }
    #send-btn:hover:not(:disabled) {
      background: #c4502d;
      box-shadow: 0 4px 14px rgba(217,95,59,0.3);
      transform: translateY(-1px);
    }
    #send-btn:active:not(:disabled) { transform: none; }
    #send-btn:disabled {
      background: var(--stone);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ── Voice / mic button ────────────────────── */
    #mic-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
      position: relative;
    }

    #mic-btn svg { width: 18px; height: 18px; fill: var(--text-mid); transition: fill 0.18s; }

    #mic-btn:hover:not(:disabled) {
      background: var(--cream3);
      border-color: var(--coral-soft);
    }

    #mic-btn:hover:not(:disabled) svg { fill: var(--coral); }

    #mic-btn.listening {
      background: var(--coral-bg);
      border-color: var(--coral);
      box-shadow: 0 0 0 3px var(--coral-ring);
      animation: mic-pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.listening svg { fill: var(--coral); }

    #mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--coral-ring); }
      50%       { box-shadow: 0 0 0 7px transparent; }
    }

    /* voice transcript preview inside input */
    #chat-input.listening {
      border-color: var(--coral-soft);
      box-shadow: 0 0 0 3px var(--coral-ring);
    }

    /* TTS speaker toggle in topbar */
    #tts-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px 5px 8px;
      font-size: 12px;
      color: var(--text-mid);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    #tts-toggle:hover { background: var(--cream3); }

    #tts-toggle.active {
      background: var(--sage-bg);
      border-color: rgba(90,138,106,0.3);
      color: var(--sage);
    }

    #tts-toggle svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Leaflet overrides ─────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: var(--shadow-md) !important;
      font-family: var(--body) !important;
      font-size: 13px !important;
    }
    .leaflet-popup-tip { background: #fff !important; }
    .leaflet-control-zoom a {
      background: #fff !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
  </style>
</head>
<body>

<!-- ── Top bar ────────────────────────────────── -->
<div id="topbar">
  <div class="logo">
    <div class="logo-mark">🛟</div>
    <div>
      <span class="logo-text">Roadent</span>
      <span class="logo-sub"> · Road Safety Assistant</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="tts-toggle" onclick="toggleTTS()" title="Toggle voice readout">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <span id="tts-label">Voice off</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot locating" id="status-dot"></div>
      <span id="status-label">Finding your location…</span>
    </div>
  </div>
</div>

<!-- ── Main ──────────────────────────────────── -->
<div id="main">

  <!-- Map -->
  <div id="map-panel">
    <div id="map"></div>
    <div class="coord-pill" id="coord-pill"></div>
  </div>

  <!-- Chat -->
  <div id="chat-panel">

    <div id="panel-header">
      <div class="header-label">Emergency Help</div>
      <button id="sos-btn" disabled onclick="triggerSOS()">
        <span class="sos-icon">🆘</span>
        I need help right now
      </button>
      <div class="sos-hint" id="sos-hint">Finding your location…</div>
      <div id="offline-notice">
        ⚡ Offline — showing saved local data
      </div>
    </div>

    <div id="chat-box"></div>

    <div id="bottom">
      <div id="hotlines">
        <div class="hotline"><strong>108</strong>Ambulance</div>
        <div class="hotline"><strong>100</strong>Police</div>
        <div class="hotline"><strong>101</strong>Fire</div>
        <div class="hotline"><strong>1073</strong>Road Accident</div>
      </div>
      <div id="input-row">
        <input type="text" id="chat-input" placeholder="What happened? Type here…" disabled>
        <button id="mic-btn" disabled onclick="toggleMic()" title="Speak your emergency">
          <svg viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <button id="send-btn" disabled onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
// Auto-detect: use same origin when hosted, localhost for local dev
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : window.location.origin;

let userLat    = null;
let userLng    = null;
let userMarker = null;   // keep ref so we can include in fitBounds
let mapMarkers = [];
let chatHistory = [];    // renamed from 'history' (shadows window.history)
let busy       = false;

const TYPE_META = {
  hospital:      { emoji: '🏥', label: 'Hospitals',       color: '#d95f3b' },
  ambulance:     { emoji: '🚑', label: 'Ambulance',       color: '#5a8a6a' },
  police:        { emoji: '👮', label: 'Police Stations', color: '#3b7fc4' },
  towing:        { emoji: '🏗️', label: 'Towing Services', color: '#b07d2a' },
  puncture_shop: { emoji: '🔧', label: 'Repair Shops',    color: '#7c6e9e' },
};

/* ═══════════════════════════════════════════
   MAP SETUP
   ═══════════════════════════════════════════ */
const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 18,
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ═══════════════════════════════════════════
   GEOLOCATION  — runs after all functions defined
   ═══════════════════════════════════════════ */
function startGeolocation() {
  setStatus('locating', 'Finding your location…');
  addBot("Finding your location — please allow access when prompted. I'll connect you to nearby help the moment I know where you are.");

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(onGotLocation, onLocationError);
  } else {
    onLocationError();
  }
}

function onGotLocation(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  onLocationReady();
}

function onLocationError() {
  setStatus(null, 'Location unavailable');
  addBot("I couldn't get your GPS location automatically. You can still type your city or area and I'll do my best to help.");
  enableInput();
}

function onLocationReady() {
  map.setView([userLat, userLng], 14);

  // User pin
  const userPin = L.divIcon({
    html: `<div style="
      width:16px;height:16px;
      background:#d95f3b;
      border:3px solid #fff;
      border-radius:50%;
      box-shadow:0 2px 10px rgba(217,95,59,0.45)
    "></div>`,
    className: '', iconAnchor: [8, 8],
  });
  userMarker = L.marker([userLat, userLng], { icon: userPin })
    .addTo(map)
    .bindPopup('<b>You are here</b>');

  // Coord pill
  document.getElementById('coord-pill').textContent =
    `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
  document.getElementById('coord-pill').classList.add('show');

  setStatus('online', 'Location found');
  document.getElementById('sos-hint').textContent = 'Tap above for immediate emergency help';
  document.getElementById('sos-btn').disabled = false;
  enableInput();

  document.getElementById('chat-box').innerHTML = '';
  addBot("I've found your location. Press <strong>I need help right now</strong> for the nearest hospitals, police, and ambulances — or describe what happened below.");
}

/* ═══════════════════════════════════════════
   SOS BUTTON  →  /api/emergency  (fast, no LLM)
   then  →  /api/chat  for the AI reply
   ═══════════════════════════════════════════ */
async function triggerSOS() {
  if (busy) return;
  if (!userLat) {
    addBot("I still don't have your location. Please allow GPS access or type your city below.");
    return;
  }

  const userText = '🆘 I need immediate emergency help';
  addUser(userText);
  busy = true;
  setInputEnabled(false);

  const typing = addTyping();

  try {
    // ── Step 1: fast raw lookup (no LLM, < 300ms) ──
    const eRes = await fetch(`${API}/api/emergency`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: userLat, lng: userLng }),
    });

    typing.remove();

    if (!eRes.ok) throw new Error(`emergency ${eRes.status}`);
    const eData = await eRes.json();

    const services = eData.services || [];
    if (services.length > 0) {
      clearMarkers();
      services.forEach(plotMarker);
      fitMarkers();
      renderServices(services, false, true);   // true = show report button after SOS
    } else {
      addFallback();
    }

    // ── Step 2: AI reply (async, non-blocking) ──
    // We fire this in the background so the user already sees the cards above.
    const sosMessage = 'I was in a road accident and pressed the SOS button. Summarise what help is nearest and what I should do right now.';
    chatHistory.push({ role: 'user', content: sosMessage });

    const cRes = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: sosMessage,
        lat: userLat,
        lng: userLng,
        history: chatHistory.slice(-6),
        offline: !navigator.onLine,
      }),
    });

    if (cRes.ok) {
      const cData = await cRes.json();
      if (cData.offline) showOffline();
      if (cData.reply) {
        addBot(cData.reply.replace(/\n/g, '<br>'), cData.offline);
        chatHistory.push({ role: 'assistant', content: cData.reply });
      }
    }

  } catch (err) {
    typing.remove();
    console.error('[SOS]', err);
    showOffline();
    addFallback();
  }

  busy = false;
  setInputEnabled(true);
}

/* ═══════════════════════════════════════════
   CHAT SEND  →  /api/chat
   ═══════════════════════════════════════════ */
async function sendMessage() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if (!txt || busy) return;
  inp.value = '';
  addUser(txt);
  await doChat(txt);
}

async function doChat(text) {
  busy = true;
  setInputEnabled(false);
  chatHistory.push({ role: 'user', content: text });
  const typing = addTyping();

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        lat: userLat,
        lng: userLng,
        history: chatHistory.slice(-8),   // last 8 turns = multi-turn memory
        offline: !navigator.onLine,
      }),
    });

    typing.remove();
    if (!res.ok) throw new Error(`chat ${res.status}`);
    const data = await res.json();

    if (data.offline) showOffline();

    // If the reply came with service data, show cards + AI text
    if (data.services && data.services.length > 0) {
      clearMarkers();
      data.services.forEach(plotMarker);
      fitMarkers();
      renderServices(data.services, data.offline);
    }

    // Always show the AI reply text as well (may be a follow-up answer)
    if (data.reply) {
      addBot(data.reply.replace(/\n/g, '<br>'), data.offline);
    } else if (!data.services?.length) {
      addFallback();
    }

    chatHistory.push({ role: 'assistant', content: data.reply || '' });

  } catch (err) {
    typing.remove();
    console.error('[chat]', err);
    showOffline();
    addFallback();
  }

  busy = false;
  setInputEnabled(true);
}

/* ═══════════════════════════════════════════
   RENDER SERVICE CARDS
   ═══════════════════════════════════════════ */
function renderServices(services, isOffline, showReportBtn = false) {
  // Group by type
  const grouped = {};
  services.forEach(s => {
    (grouped[s.type] = grouped[s.type] || []).push(s);
  });

  const order = ['hospital', 'ambulance', 'police', 'towing', 'puncture_shop'];

  // Detect if any results came from OSM
  const hasOSM   = services.some(s => s.source === 'openstreetmap');
  const hasLocal = services.some(s => s.source !== 'openstreetmap');
  let sourceLabel, sourceClass;
  if (hasOSM && hasLocal) { sourceLabel = '🌐 Local DB + OpenStreetMap'; sourceClass = 'osm'; }
  else if (hasOSM)        { sourceLabel = '🌐 OpenStreetMap (global)';   sourceClass = 'osm'; }
  else                    { sourceLabel = '🗃️ Local Database';            sourceClass = 'local'; }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';

  const senderLabel = document.createElement('div');
  senderLabel.className = 'msg-sender';
  senderLabel.textContent = 'Roadent Assistant';
  wrap.appendChild(senderLabel);

  const bubble = document.createElement('div');
  bubble.className = isOffline ? 'bubble bot warn' : 'bubble bot';

  // Source badge
  const badge = document.createElement('div');
  badge.className = `source-badge ${sourceClass}`;
  badge.textContent = sourceLabel;
  bubble.appendChild(badge);

  // Intro text
  const intro = document.createElement('div');
  intro.style.cssText = 'font-size:14px;margin-bottom:12px;line-height:1.5;';
  intro.innerHTML = isOffline
    ? '⚡ Offline — showing your nearest services from the local database:'
    : "Here\'s what\'s nearest to you. Call the first number immediately if you need an ambulance.";
  bubble.appendChild(intro);

  // Service sections
  order.forEach(type => {
    if (!grouped[type]) return;
    const meta = TYPE_META[type] || { emoji: '📍', label: type };

    const section = document.createElement('div');
    section.className = 'svc-section';

    const secLabel = document.createElement('div');
    secLabel.className = 'svc-section-label';
    secLabel.textContent = `${meta.emoji}  ${meta.label}`;
    section.appendChild(secLabel);

    grouped[type].forEach(s => {
      const card = document.createElement('div');
      card.className = 'svc-card';

      const phoneDisplay = (s.phone && s.phone !== 'N/A')
        ? `📞 <a href="tel:${s.phone}" style="color:inherit;text-decoration:none;">${s.phone}</a>`
        : 'Call <a href="tel:108" style="color:inherit;text-decoration:none;">108</a>';

      const addrLine = s.address && s.address !== 'N/A'
        ? `<div class="svc-addr">${s.address}${s.city ? ', ' + s.city : ''}</div>`
        : '';

      card.innerHTML = `
        <div class="svc-emoji">${meta.emoji}</div>
        <div class="svc-body">
          <div class="svc-name">${s.name}</div>
          <div class="svc-phone">${phoneDisplay}</div>
          ${addrLine}
        </div>
        <div class="svc-dist">${s.distance_km} km</div>`;

      section.appendChild(card);
    });

    bubble.appendChild(section);
  });

  // National numbers strip
  const strip = document.createElement('div');
  strip.className = 'national-strip';
  [['108','Ambulance'], ['100','Police'], ['1073','Highway']].forEach(([num, lbl]) => {
    const chip = document.createElement('div');
    chip.className = 'nat-chip';
    chip.innerHTML = `<strong><a href="tel:${num}" style="color:inherit;text-decoration:none;">${num}</a></strong>${lbl}`;
    strip.appendChild(chip);
  });
  bubble.appendChild(strip);

  // Report button — only shown after SOS, not on every chat response
  if (showReportBtn && userLat) {
    const reportBtn = document.createElement('button');
    reportBtn.className = 'report-btn';
    reportBtn.innerHTML = '📋 Copy incident report to clipboard';
    reportBtn.onclick = () => generateReport(services, reportBtn);
    bubble.appendChild(reportBtn);
  }

  wrap.appendChild(bubble);
  document.getElementById('chat-box').appendChild(wrap);
  scrollBottom();
}

/* ═══════════════════════════════════════════
   INCIDENT REPORT  →  /api/report
   ═══════════════════════════════════════════ */
async function generateReport(services, btn) {
  btn.textContent = '⏳ Generating…';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/report`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lat: userLat,
        lng: userLng,
        description: 'Road accident — emergency services requested via Roadent',
        services_shown: services,
      }),
    });

    if (!res.ok) throw new Error(`report ${res.status}`);
    const data = await res.json();

    await navigator.clipboard.writeText(data.report);

    btn.className = 'report-btn copied';
    btn.innerHTML = '✅ Report copied to clipboard!';
    btn.disabled = false;

    // Reset button after 4 seconds
    setTimeout(() => {
      btn.className = 'report-btn';
      btn.innerHTML = '📋 Copy incident report to clipboard';
    }, 4000);

  } catch (err) {
    console.error('[report]', err);
    btn.className = 'report-btn';
    btn.innerHTML = '⚠️ Copy failed — try again';
    btn.disabled = false;
  }
}

/* ═══════════════════════════════════════════
   MAP MARKERS
   ═══════════════════════════════════════════ */
function plotMarker(s) {
  const meta = TYPE_META[s.type] || { emoji: '📍', color: '#888' };
  const icon = L.divIcon({
    html: `<div style="
      background:${meta.color};
      width:30px;height:30px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:3px solid rgba(255,255,255,0.85);
      box-shadow:0 3px 10px rgba(0,0,0,0.18);
      display:flex;align-items:center;justify-content:center;
    "><span style="transform:rotate(45deg);font-size:13px">${meta.emoji}</span></div>`,
    className: '',
    iconAnchor: [15, 30],
    popupAnchor: [0, -30],
  });

  const phoneLink = (s.phone && s.phone !== 'N/A')
    ? `<a href="tel:${s.phone}" style="color:#5a8a6a;font-weight:600;">${s.phone}</a>`
    : '<span style="color:#5a8a6a;">Call 108</span>';

  const m = L.marker([s.lat, s.lng], { icon })
    .addTo(map)
    .bindPopup(`<b>${s.name}</b><br>${phoneLink}<br><small>${s.distance_km} km away</small>`);
  mapMarkers.push(m);
}

function clearMarkers() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
}

function fitMarkers() {
  if (!mapMarkers.length) return;
  // Include the user's own pin in the bounds so they're never zoomed away from themselves
  const allLayers = userMarker ? [...mapMarkers, userMarker] : mapMarkers;
  const group = L.featureGroup(allLayers);
  map.fitBounds(group.getBounds().pad(0.25));
}

/* ═══════════════════════════════════════════
   MESSAGE HELPERS
   ═══════════════════════════════════════════ */
function addUser(text) {
  const w = document.createElement('div');
  w.className = 'msg-wrap user';
  w.innerHTML = `<div class="msg-sender">You</div><div class="bubble user">${text}</div>`;
  document.getElementById('chat-box').appendChild(w);
  scrollBottom();
}

function addBot(html, isWarn = false) {
  const w = document.createElement('div');
  w.className = 'msg-wrap bot';
  w.innerHTML = `
    <div class="msg-sender">Roadent Assistant</div>
    <div class="bubble bot${isWarn ? ' warn' : ''}">${html}</div>`;
  document.getElementById('chat-box').appendChild(w);
  scrollBottom();
  return w;
}

function addFallback() {
  addBot(`<strong>Can't reach the server right now.</strong><br><br>
    Call these numbers immediately:<br><br>
    🚑 <a href="tel:108" style="color:var(--coral);font-weight:700;">108</a> — Ambulance<br>
    👮 <a href="tel:100" style="color:var(--coral);font-weight:700;">100</a> — Police<br>
    🚒 <a href="tel:101" style="color:var(--coral);font-weight:700;">101</a> — Fire Brigade<br>
    🛣️ <a href="tel:1073" style="color:var(--coral);font-weight:700;">1073</a> — Road Accident Helpline<br><br>
    <span style="font-size:12px;color:var(--text-soft)">Stay calm. Tell them your location clearly.</span>`,
    true);
}

function addTyping() {
  const w = document.createElement('div');
  w.className = 'msg-wrap bot';
  w.innerHTML = `
    <div class="msg-sender">Roadent Assistant</div>
    <div class="bubble bot" style="padding:14px 16px">
      <div class="typing-row"><span></span><span></span><span></span></div>
    </div>`;
  document.getElementById('chat-box').appendChild(w);
  scrollBottom();
  return w;
}

function scrollBottom() {
  const b = document.getElementById('chat-box');
  b.scrollTop = b.scrollHeight;
}

/* ═══════════════════════════════════════════
   UI STATE HELPERS
   ═══════════════════════════════════════════ */
function setStatus(type, label) {
  const dot = document.getElementById('status-dot');
  dot.className = `chip-dot${type ? ' ' + type : ''}`;
  document.getElementById('status-label').textContent = label;
}

function showOffline() {
  document.getElementById('offline-notice').classList.add('show');
  setStatus('offline', 'Offline mode');
}

function enableInput() {
  document.getElementById('chat-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
}

function setInputEnabled(on) {
  document.getElementById('chat-input').disabled = !on;
  document.getElementById('send-btn').disabled = !on;
  // Only re-enable SOS if we actually have a location
  if (userLat) document.getElementById('sos-btn').disabled = !on;
}

/* ═══════════════════════════════════════════
   KEYBOARD + NETWORK EVENTS
   ═══════════════════════════════════════════ */
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('offline', showOffline);
window.addEventListener('online', () => {
  document.getElementById('offline-notice').classList.remove('show');
  if (userLat) setStatus('online', 'Back online');
});

/* ═══════════════════════════════════════════
   VOICE MODULE
   ─ Speech-to-Text  : SpeechRecognition API (built-in browser, no key needed)
   ─ Text-to-Speech  : speechSynthesis API   (built-in browser, works offline)
   Both APIs work in Chrome, Edge, Safari on Android/iOS/Desktop.
   ═══════════════════════════════════════════ */

// ── TTS (Text-to-Speech) ────────────────────
let ttsEnabled  = false;
let currentUtterance = null;

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn   = document.getElementById('tts-toggle');
  const label = document.getElementById('tts-label');
  if (ttsEnabled) {
    btn.classList.add('active');
    label.textContent = 'Voice on';
    speak("Voice readout enabled. I will read responses aloud.");
  } else {
    btn.classList.remove('active');
    label.textContent = 'Voice off';
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  }
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;

  // Cancel any current speech before starting new
  window.speechSynthesis.cancel();

  // Strip HTML tags and keep text clean for TTS
  const clean = text
    .replace(/<[^>]+>/g, ' ')
    .replace(/[📞🏥👮🚑🏗️🔧🆘⚡📋✅⚠️🛟]/gu, '')
    .replace(/\s+/g, ' ')
    .trim();

  if (!clean) return;

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang  = 'en-IN';   // Indian English accent — most natural for this context
  utter.rate  = 0.92;       // slightly slower = clearer in noisy/stressed situations
  utter.pitch = 1.0;

  // Prefer a female voice if available (generally clearer for emergency guidance)
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang.startsWith('en') && v.name.toLowerCase().includes('female')
  ) || voices.find(v =>
    v.lang.startsWith('en-IN') || v.lang.startsWith('en-GB')
  );
  if (preferred) utter.voice = preferred;

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

// Voices load asynchronously on some browsers
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ── STT (Speech-to-Text) ────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition  = null;
let isListening  = false;

function initRecognition() {
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.continuous      = false;   // single utterance per press
  r.interimResults  = true;    // show partial transcript while speaking
  r.lang            = 'en-IN'; // Indian English — handles accents well
  r.maxAlternatives = 1;

  r.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('chat-input').classList.add('listening');
    document.getElementById('chat-input').placeholder = '🎤 Listening…';
  };

  r.onresult = (e) => {
    let interim = '';
    let final   = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    // Show interim transcript in the input box as the user speaks
    document.getElementById('chat-input').value = final || interim;
  };

  r.onspeechend = () => r.stop();

  r.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('chat-input').classList.remove('listening');
    document.getElementById('chat-input').placeholder = 'What happened? Type here…';

    // Auto-send if there's a transcript
    const txt = document.getElementById('chat-input').value.trim();
    if (txt) {
      // Small delay so the user can see what was recognised before it sends
      setTimeout(() => sendMessage(), 600);
    }
  };

  r.onerror = (e) => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('chat-input').classList.remove('listening');
    document.getElementById('chat-input').placeholder = 'What happened? Type here…';

    if (e.error === 'not-allowed') {
      addBot("⚠️ Microphone access denied. Please allow mic access in your browser settings and try again.");
    } else if (e.error === 'no-speech') {
      document.getElementById('chat-input').placeholder = 'No speech detected — try again';
    } else {
      console.warn('[STT] error:', e.error);
    }
  };

  return r;
}

function toggleMic() {
  if (!SpeechRecognition) {
    addBot("⚠️ Voice input is not supported in this browser. Please use Chrome or Edge.");
    return;
  }

  if (isListening) {
    // User pressed mic again to cancel
    recognition?.stop();
    return;
  }

  // (Re-)initialise each time — avoids stale state issues
  recognition = initRecognition();
  if (!recognition) return;

  try {
    recognition.start();
  } catch (err) {
    console.warn('[STT] start error:', err);
  }
}

// Enable/disable mic button alongside the text input
const _origEnableInput    = enableInput;
const _origSetInputEnabled = setInputEnabled;

// Patch enableInput to also enable mic button
enableInput = function() {
  _origEnableInput();
  if (SpeechRecognition) {
    const mb = document.getElementById('mic-btn');
    if (mb) mb.disabled = false;
  }
};

// Patch setInputEnabled to control mic too
setInputEnabled = function(on) {
  _origSetInputEnabled(on);
  if (SpeechRecognition) {
    const mb = document.getElementById('mic-btn');
    if (mb) mb.disabled = !on;
  }
};

// ── Hook TTS into addBot ────────────────────
// Wrap addBot so every bot message is also spoken when TTS is on
const _origAddBot = addBot;
addBot = function(html, isWarn = false) {
  const el = _origAddBot(html, isWarn);
  speak(html);   // speak() strips HTML tags internally
  return el;
};


// ── Kick off geolocation last, after every function is defined ──
startGeolocation();
</script>
